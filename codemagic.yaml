# codemagic.yaml completo para Capacitor con Swift Package Manager (SPM)
workflows:
  ios-release:
    name: NutriStats iOS Release (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Next.js Build and Export
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS App (No Codesign - SPM Mode)
        script: |
          # Usamos -project en lugar de -workspace porque usas SPM
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
      - name: Package App as Zip
        script: |
          # Buscamos el archivo .app generado en los datos derivados de Xcode
          cd ~/Library/Developer/Xcode/DerivedData
          
          # Buscamos la carpeta de salida Release-iphoneos
          APP_PATH=$(find . -name "App.app" -type d | grep "Release-iphoneos" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró el archivo App.app generado."
            exit 1
          fi
          
          echo "Archivo encontrado en: $APP_PATH"
          cd "$APP_PATH/.."
          zip -r NutriStats.app.zip App.app
          mv NutriStats.app.zip $CM_BUILD_DIR/
    artifacts:
      - NutriStats.app.zip