workflows:
  ios-release:
    name: NutriStats Firebase Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Next.js Build and Export
        script: |
          # Importante: Esto genera la carpeta 'out' necesaria para Capacitor
          npm run build
      - name: Capacitor Sync
        script: |
          # Copia los archivos de Firebase/Next.js al proyecto de iOS
          npx cap sync ios
      - name: Build iOS App (No Codesign)
        script: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
      - name: Package App as Zip
        script: |
          cd ~/Library/Developer/Xcode/DerivedData
          APP_PATH=$(find . -name "App.app" -type d | grep "Release-iphoneos" | head -1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          cd "$APP_PATH/.."
          zip -r NutriStats.app.zip App.app
          mv NutriStats.app.zip $CM_BUILD_DIR/
    artifacts:
      - NutriStats.app.zip