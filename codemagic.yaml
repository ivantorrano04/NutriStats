# codemagic.yaml simplificado y compatible
workflows:
  ios-release:
    name: NutriStats iOS Release (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22.14.0 
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Next.js Build and Export
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build iOS App (No Codesign - SPM Mode)
        script: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
      - name: Package App as Zip
        script: |
          cd ~/Library/Developer/Xcode/DerivedData
          APP_PATH=$(find . -name "App.app" -type d | grep "Release-iphoneos" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: No se encontró App.app."
            exit 1
          fi
          
          cd "$APP_PATH/.."
          zip -r NutriStats.app.zip App.app
          mv NutriStats.app.zip $CM_BUILD_DIR/
    artifacts:
      - NutriStats.app.zip